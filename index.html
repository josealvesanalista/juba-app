<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MANEJO BETTAS - Versão Base</title>
    <style>
        :root { --bg: #0a192f; --card: #112240; --accent: #64ffda; --text: #e6f1ff; --red: #ff4d4d; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        
        /* Inputs e Botões Básicos */
        input, button { width: 90%; margin: 10px auto; display: block; padding: 15px; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        input { background: #0c1d36; border: 1px solid #233554; color: white; }
        button { background: var(--accent); color: #0a192f; font-weight: bold; border: none; cursor: pointer; text-transform: uppercase; }
        
        /* Telas */
        .screen { display: none; padding: 20px; text-align: center; }
        .screen.active { display: block; }
        
        /* Menu Lateral Base */
        header { background: var(--card); padding: 15px; display: flex; align-items: center; border-bottom: 1px solid #233554; }
        .menu-btn { font-size: 28px; color: var(--accent); background: none; border: none; width: auto; margin: 0; padding: 0; }
        #side-menu { position: fixed; left: -250px; top: 0; width: 250px; height: 100%; background: var(--card); transition: 0.3s; z-index: 1000; padding: 20px; box-sizing: border-box; }
        #side-menu.open { left: 0; }
        #overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.7); display:none; z-index: 999; }
        #overlay.active { display: block; }
        .menu-item { display: block; padding: 15px; color: var(--text); border-bottom: 1px solid #233554; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="tela-login" class="screen active" style="padding-top: 80px;">
        <h2 style="color:var(--accent)">MANEJO BETTAS</h2>
        <input type="email" id="email" placeholder="E-mail">
        <input type="password" id="senha" placeholder="Senha">
        <button id="btn-entrar">ENTRAR</button>
        <button id="btn-criar" style="background:none; color:white; border:1px solid #233554">CRIAR CONTA</button>
    </div>

    <div id="app-content" style="display:none">
        <div id="overlay"></div>
        <header>
            <button class="menu-btn" id="btn-menu">☰</button>
            <strong style="margin-left:15px; color:var(--accent)">JUBA BETTAS</strong>
        </header>

        <nav id="side-menu">
            <h3 style="color:var(--accent)">MENU</h3>
            <div class="menu-item" data-target="tela-home">🏠 HOME</div>
            <div class="menu-item" data-target="tela-registrar">📝 REGISTRAR</div>
            <div class="menu-item" data-target="tela-troca">💧 TPA</div>
            <div class="menu-item" data-target="tela-consultar">🔍 CONSULTAR</div>
            <div class="menu-item" id="btn-sair" style="color:var(--red); margin-top: 40px">🚪 SAIR</div>
        </nav>

        <section id="tela-home" class="screen active">
            <h2>BEM-VINDO!</h2>
            <p style="color: #8892b0">Selecione uma opção no menu superior.</p>
        </section>

        <section id="tela-registrar" class="screen">
            <h3 style="color:var(--accent)">REGISTRAR NINHADA</h3>
            <input type="text" id="idN" placeholder="Nº da Ninhada">
            <input type="text" id="pai" placeholder="Pai">
            <input type="text" id="mae" placeholder="Mãe">
            <input type="date" id="dataE">
            <input type="number" id="qtd" placeholder="Qtd Alevinos">
            <button id="btn-salvar">SALVAR</button>
        </section>

        <section id="tela-troca" class="screen">
            <h3 style="color:var(--accent)">REGISTRAR TPA</h3>
            <input type="text" id="idT" placeholder="Nº da Ninhada">
            <input type="date" id="dataT">
            <button id="btn-salvar-tpa" style="background:orange; color:white">SALVAR TPA</button>
        </section>

        <section id="tela-consultar" class="screen">
            <h3 style="color:var(--accent)">CONSULTAR</h3>
            <input type="text" id="idB" placeholder="Nº da Ninhada">
            <button id="btn-consultar" style="background:dodgerblue; color:white">PESQUISAR</button>
            <div id="res" style="margin-top:20px; text-align:left"></div>
        </section>
    </div>
