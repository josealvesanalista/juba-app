<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a192f">
    <title>Manejo Bettas - Universal v6.7</title>
    <style>
        :root { --primary: #00a8ff; --bg: #0a192f; --card: #112240; --text: #e6f1ff; --accent: #64ffda; --warning: #f39c12; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 550px; background: var(--card); padding: 25px; border-radius: 15px; border: 1px solid #233554; box-sizing: border-box; }
        h2 { color: var(--accent); text-align: center; text-transform: uppercase; font-size: 1.1rem; border-bottom: 2px solid var(--accent); padding-bottom: 10px; margin-top: 0; }
        .form-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 4px; font-size: 12px; color: var(--primary); font-weight: bold; }
        input { width: 100%; padding: 12px; background: #0a192f; border: 1px solid #233554; border-radius: 8px; color: white; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 12px; text-transform: uppercase; margin-top: 10px; }
        .btn-auth { background: var(--accent); color: #0a192f; }
        .btn-save { background: var(--accent); color: #0a192f; }
        .btn-logout { background: transparent; color: #ff4d4d; border: 1px solid #ff4d4d; width: auto; padding: 5px 10px; font-size: 10px; margin: 0; }
        .suporte { margin-top: 20px; text-align: center; font-size: 11px; color: #8892b0; border-top: 1px solid #233554; padding-top: 15px; }
        .instrucao-cad { font-size: 11px; color: var(--warning); text-align: center; margin-bottom: 15px; padding: 10px; background: rgba(243, 156, 18, 0.1); border-radius: 8px; }
        #res { margin-top: 15px; padding: 15px; background: rgba(255,255,255,0.03); border-radius: 10px; border: 1px solid var(--accent); display: none; }
        table { width: 100%; font-size: 12px; margin-top: 10px; border-collapse: collapse; }
        th, td { padding: 8px; border-bottom: 1px solid #233554; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div id="auth-container">
        <h2>Acesso Criador</h2>
        
        <div class="instrucao-cad">
            ⚠️ <strong>Se não tem cadastro:</strong> preencha e-mail e senha e clique em "Criar nova conta".
        </div>

        <div class="form-group"><label>E-mail</label><input type="email" id="email" placeholder="seu@email.com"></div>
        <div class="form-group"><label>Senha</label><input type="password" id="senha" placeholder="******"></div>
        <button class="btn-auth" id="loginBtn">Entrar no Sistema</button>
        <button style="background:transparent; color:var(--accent); font-size:11px;" id="cadBtn">Criar nova conta agora</button>
        
        <div class="suporte">
            SUPORTE WHATSAPP:<br>
            <a href="https://wa.me/5583998027542" style="color:var(--accent); text-decoration:none; font-weight:bold;">83 99802-7542</a>
        </div>
    </div>

    <div id="app-container" style="display:none">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px">
            <small id="userEmail" style="color:var(--accent); font-size:10px"></small>
            <button class="btn-logout" id="logoutBtn">Sair</button>
        </div>
        <h2>Manejo Online</h2>
        
        <div class="form-group"><label>Nº da Ninhada</label><input type="text" id="idN"></div>
        <div style="display:flex; gap:10px">
            <div style="flex:1"><label>Macho (Pai)</label><input type="text" id="pai"></div>
            <div style="flex:1"><label>Fêmea (Mãe)</label><input type="text" id="mae"></div>
        </div>
        <div style="display:flex; gap:10px">
            <div style="flex:1"><label>Data de Eclosão</label><input type="date" id="dataE"></div>
            <div style="flex:1"><label>Quantidade</label><input type="number" id="qtd"></div>
        </div>
        <button class="btn-save" id="saveBtn">Salvar Ninhada</button>

        <div style="margin-top:25px; border-top:1px dashed #233554; padding-top:15px">
            <label>Buscar Ninhada por Nº</label>
            <input type="text" id="idBusca">
            <button style="background:var(--primary); color:white;" id="searchBtn">Consultar</button>
            <div id="res"></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDGkFLjHPD2w9vvG8JS9KlKE6v5gSJ7emE",
      authDomain: "jubabettas-5444b.firebaseapp.com",
      projectId: "jubabettas-5444b",
      storageBucket: "jubabettas-5444b.firebasestorage.app",
      messagingSenderId: "411914499486",
      appId: "1:411914499486:web:f7922f93bb67500b9dd28f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('app-container').style.display = 'block';
            document.getElementById('userEmail').innerText = user.email;
        } else {
            document.getElementById('auth-container').style.display = 'block';
            document.getElementById('app-container').style.display = 'none';
        }
    });

    document.getElementById('loginBtn').onclick = () => {
        signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('senha').value)
        .catch(e => alert("Erro ao entrar: Verifique e-mail/senha."));
    };

    document.getElementById('cadBtn').onclick = () => {
        createUserWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('senha').value)
        .then(() => alert("Conta criada com sucesso!"))
        .catch(e => alert("Erro ao criar conta: Certifique-se de que é um e-mail válido e a senha tem 6 caracteres."));
    };

    document.getElementById('logoutBtn').onclick = () => signOut(auth);

    document.getElementById('saveBtn').onclick = async () => {
        const u = auth.currentUser;
        const id = document.getElementById('idN').value;
        const qtd = document.getElementById('qtd').value;
        if(!id || !qtd) return alert("Preencha Nº da Ninhada e Quantidade!");

        const ref = doc(db, "usuarios", u.uid, "ninhadas", id);
        const snap = await getDoc(ref);
        let hist = snap.exists() ? snap.data().historico : [];
        hist.push({ data: new Date().toLocaleString('pt-BR'), qtd: parseInt(qtd) });

        await setDoc(ref, {
            id, pai: document.getElementById('pai').value, mae: document.getElementById('mae').value,
            dataE: document.getElementById('dataE').value, historico: hist
        });
        alert("✅ Dados salvos com sucesso!");
    };

    document.getElementById('searchBtn').onclick = async () => {
        const u = auth.currentUser;
        const id = document.getElementById('idBusca').value;
        if(!id) return alert("Digite o número para buscar");
        const snap = await getDoc(doc(db, "usuarios", u.uid, "ninhadas", id));
        if (snap.exists()) {
            const d = snap.data();

            let eclosao = new Date(d.dataE);
