<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a192f">
    <title>MANEJO BETTAS v8.9</title>
    
    <style>
        :root { --bg: #0a192f; --card: #112240; --accent: #64ffda; --blue: #00a8ff; --orange: #f39c12; --text: #e6f1ff; --red: #ff4d4d; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow-x: hidden; }
        header { background: var(--card); padding: 15px; display: flex; align-items: center; border-bottom: 1px solid #233554; }
        .menu-btn { font-size: 24px; color: var(--accent); background: none; border: none; cursor: pointer; }
        #side-menu { position: fixed; left: -250px; top: 0; width: 250px; height: 100%; background: var(--card); transition: 0.3s; z-index: 1000; padding: 20px; box-sizing: border-box; }
        #side-menu.open { left: 0; }
        #overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.7); display:none; z-index: 999; }
        #overlay.active { display: block; }
        .menu-item { display: block; padding: 15px; color: var(--text); text-decoration: none; border-bottom: 1px solid #233554; font-weight: bold; cursor: pointer; }
        .screen { display: none; padding: 20px; max-width: 450px; margin: auto; text-align: center; }
        .screen.active { display: block; }
        .home-logo { width: 140px; height: 140px; border-radius: 50%; border: 3px solid var(--accent); margin: 20px auto; display: block; }
        .card-alerta { background: #1d1d1d; border-left: 5px solid var(--red); padding: 15px; border-radius: 8px; margin-top: 20px; text-align: left; }
        label { display: block; color: var(--blue); font-size: 12px; margin-top: 10px; text-align: left; font-weight: bold; }
        input { width: 100%; padding: 12px; background: #0c1d36; border: 1px solid #233554; border-radius: 6px; color: white; margin-top: 5px; box-sizing: border-box; font-size: 16px; }
        input[readonly] { background: #071224; color: #8892b0; border-color: #1d2d44; }
        button { border: none; border-radius: 6px; font-weight: bold; cursor: pointer; padding: 15px; width: 100%; margin-top: 15px; text-transform: uppercase; }
        .btn-main { background: var(--accent); color: #0a192f; }
        .card-res { border: 1px solid var(--accent); border-radius: 10px; padding: 15px; background: #112240; text-align: left; margin-top: 20px; }
        .footer-creditos { text-align: center; font-size: 10px; color: #8892b0; margin-top: 30px; padding: 20px; }
    </style>

    <script>
        window.handleLogin = () => alert("Aguarde... Conectando ao servidor. Se demorar, atualize a página puxando para baixo.");
        window.handleCadastro = () => alert("Aguarde... Conectando ao servidor.");
    </script>
</head>
<body>

    <div id="tela-login" style="padding: 60px 20px; text-align: center;">
        <h2 style="color:var(--accent)">MANEJO BETTAS</h2>
        <input type="email" id="email" placeholder="E-mail">
        <input type="password" id="senha" placeholder="Senha">
        <button class="btn-main" onclick="window.handleLogin()">ENTRAR</button>
        <button style="background:none; color:var(--text); border:1px solid #233554; margin-top: 10px" onclick="window.handleCadastro()">CRIAR CONTA</button>
    </div>

    <div id="app-content" style="display:none">
        <div id="overlay" onclick="window.toggleMenu(false)"></div>
        <header>
            <button class="menu-btn" onclick="window.toggleMenu(true)">☰</button>
            <strong style="margin-left:15px; color:var(--accent)">JUBA BETTAS</strong>
        </header>

        <nav id="side-menu">
            <h3 style="color:var(--accent); padding-left:15px">MENU</h3>
            <div class="menu-item" onclick="window.showScreen('tela-home')">🏠 HOME</div>
            <div class="menu-item" onclick="window.abrirNovoRegistro()">📝 REGISTRAR NOVA</div>
            <div class="menu-item" onclick="window.showScreen('tela-troca')">💧 REGISTRAR TPA</div>
            <div class="menu-item" onclick="window.showScreen('tela-consultar')">🔍 CONSULTAR</div>
            <div class="menu-item" style="color:var(--red); margin-top: 40px" onclick="window.handleSair()">🚪 SAIR</div>
        </nav>

        <section id="tela-home" class="screen">
            <img src="icone.png" class="home-logo" onerror="this.style.display='none'">
            <h2>BEM-VINDO!</h2>
            <div id="alerta-home"></div>
        </section>

        <section id="tela-registrar" class="screen">
            <h3 id="titulo-registro">NOVA NINHADA</h3>
            <input type="hidden" id="modoRegistro" value="novo">
            
            <label>Nº NINHADA (Automático)</label>
            <input type="text" id="idN" readonly>
            
            <label>PAI ♂</label><input type="text" id="pai">
            <label>MÃE ♀</label><input type="text" id="mae">
            <label>DATA ECLOSÃO</label><input type="date" id="dataE">
