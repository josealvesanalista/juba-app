<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a192f">
    <link rel="manifest" href="manifest.json">
    <title>Juba Bettas - Multi-Criador</title>
    <style>
        :root { --primary: #00a8ff; --bg: #0a192f; --card: #112240; --text: #e6f1ff; --accent: #64ffda; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #233554; }
        
        /* Telas */
        #tela-login { display: block; }
        #tela-app { display: none; }

        h2 { color: var(--accent); text-align: center; border-bottom: 2px solid var(--accent); padding-bottom: 10px; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #0a192f; border: 1px solid #233554; border-radius: 6px; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        .btn-auth { background: var(--accent); color: #0a192f; }
        .btn-save { background: var(--primary); color: white; }
        .btn-logout { background: transparent; color: #ff4d4d; border: 1px solid #ff4d4d; margin-top: 20px; font-size: 11px; }
        
        #res { margin-top: 20px; padding: 15px; border: 1px solid var(--accent); border-radius: 8px; display: none; }
        table { width: 100%; font-size: 12px; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="tela-login">
        <h2>Acesso Criador</h2>
        <input type="email" id="email" placeholder="Seu e-mail">
        <input type="password" id="senha" placeholder="Sua senha">
        <button class="btn-auth" onclick="handleLogin()">Entrar</button>
        <button style="background: transparent; color: var(--accent); font-size: 12px;" onclick="handleCadastro()">Não tem conta? Criar agora</button>
    </div>

    <div id="tela-app">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <small id="user-info" style="color: var(--accent)"></small>
            <button class="btn-logout" style="width: auto; padding: 5px 10px;" onclick="handleLogout()">Sair</button>
        </div>
        <h2>Manejo Online</h2>
        
        <input type="text" id="idN" placeholder="Nº da Ninhada">
        <div style="display:flex; gap:10px">
            <input type="text" id="pai" placeholder="Pai">
            <input type="text" id="mae" placeholder="Mãe">
        </div>
        <div style="display:flex; gap:10px">
            <input type="date" id="dataE">
            <input type="number" id="qtd" placeholder="Qtd">
        </div>
        <button class="btn-save" onclick="handleSalvar()">Salvar Ninhada</button>

        <hr style="border: 0.5px dashed #233554; margin: 25px 0;">
        
        <input type="text" id="idBusca" placeholder="Consultar Nº">
        <button class="btn-auth" onclick="handleBuscar()">Buscar Minha Ninhada</button>
        
        <div id="res"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDGkFLjHPD2w9vvG8JS9KlKE6v5gSJ7emE",
      authDomain: "jubabettas-5444b.firebaseapp.com",
      projectId: "jubabettas-5444b",
      storageBucket: "jubabettas-5444b.firebasestorage.app",
      messagingSenderId: "411914499486",
      appId: "1:411914499486:web:f7922f93bb67500b9dd28f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // MONITOR DE SESSÃO
    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('tela-login').style.display = 'none';
            document.getElementById('tela-app').style.display = 'block';
            document.getElementById('user-info').innerText = user.email;
        } else {
            document.getElementById('tela-login').style.display = 'block';
            document.getElementById('tela-app').style.display = 'none';
        }
    });

    // FUNÇÕES DE AUTENTICAÇÃO
    window.handleLogin = () => {
        const email = document.getElementById('email').value;
        const senha = document.getElementById('senha').value;
        signInWithEmailAndPassword(auth, email, senha).catch(e => alert("Erro: " + e.message));
    };

    window.handleCadastro = () => {
        const email = document.getElementById('email').value;
        const senha = document.getElementById('senha').value;
        if(confirm("Deseja criar uma nova conta com este e-mail?")) {
            createUserWithEmailAndPassword(auth, email, senha).catch(e => alert("Erro: " + e.message));
        }
    };

    window.handleLogout = () => signOut(auth);

    // FUNÇÕES DO BANCO DE DADOS (ISOLADOS POR USER ID)
    window.handleSalvar = async () => {
        const user = auth.currentUser;
        const id = document.getElementById('idN').value;
        if(!user || !id) return alert("Erro ao identificar criador ou ID");

        // CAMINHO: usuarios / {ID_CRIADOR} / ninhadas / {N_NINHADA}
        const ref = doc(db, "usuarios", user.uid, "ninhadas", id);
        const snap = await getDoc(ref);
        let historico = snap.exists() ? snap.data().historico : [];

        historico.push({ data: new Date().toLocaleString('pt-BR'), qtd: parseInt(document.getElementById('qtd').value) });

        await setDoc(ref, {
            id, pai: document.getElementById('pai').value,
            mae: document.getElementById('mae').value,
            dataE: document.getElementById('dataE').value,
            historico
        });
        alert("Salvo com sucesso na sua conta!");
    };

    window.handleBuscar = async () => {
        const user = auth.currentUser;
        const id = document.getElementById('idBusca').value;
        const docRef = doc(db, "usuarios", user.uid, "ninhadas", id);
        const docSnap = await getDoc(docRef);

        if (docSnap.exists()) {
            const d = docSnap.data();
            document.getElementById('res').style.display = 'block';
            document.getElementById('res').innerHTML = `
                <strong>NINHADA ${d.id}</strong><br>
                <small>${d.pai} x ${d.mae}</small>
                <table><tr><th>Data</th><th>Qtd</th></tr>
                ${d.historico.map(h => `<tr><td>${h.data.split(' ')[0]}</td><td>${h.qtd}</td></tr>`).join('')}
                </table>
            `;
        } else { alert("Ninhada não encontrada na sua conta."); }
    };
</script>
</body>
</html>
