<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a192f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Juba Bettas App</title>
    <style>
        /* (Aqui vai todo o CSS da v5.3) */
        :root { --accent: #64ffda; --bg: #0a192f; --card: #112240; --text: #e6f1ff; --primary: #00a8ff; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 15px; margin: 0; }
        .container { width: 100%; max-width: 550px; background: var(--card); padding: 20px; border-radius: 15px; margin: auto; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #0a192f; border: 1px solid #233554; color: white; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; margin-top: 10px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-save { background: var(--accent); color: #0a192f; }
        #res { margin-top: 20px; padding: 15px; border: 1px solid var(--accent); border-radius: 10px; background: rgba(100,255,218,0.05); display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color:var(--accent); text-align:center; border-bottom: 2px solid var(--accent); padding-bottom:10px;">JUBA BETTAS - MANEJO</h2>
    
    <label>Nº Ninhada</label><input type="text" id="idN">
    <label>Pai</label><input type="text" id="pai">
    <label>Mãe</label><input type="text" id="mae">
    <label>Eclosão</label><input type="date" id="dataE">
    <label>Qtd Alevinos</label><input type="number" id="qtd">

    <button class="btn-save" onclick="salvarManejo()">SALVAR REGISTRO</button>

    <div style="margin-top:30px; border-top: 1px dashed #233554; padding-top:20px;">
        <label>Consultar Nº</label>
        <input type="text" id="idBusca">
        <button style="background:var(--primary); color:white" onclick="buscarManejo()">CONSULTAR</button>
        <div id="res"></div>
    </div>
</div>

<script>
    // Lógica v5.3 (LocalStorage)
    function salvarManejo() {
        const id = document.getElementById('idN').value;
        const d = document.getElementById('dataE').value;
        const q = document.getElementById('qtd').value;
        if(!id || !d || !q) return alert("Preencha os campos!");
        
        const chave = "JB_APP_" + id;
        let reg = JSON.parse(localStorage.getItem(chave)) || { historico: [] };
        reg.id = id; reg.pai = document.getElementById('pai').value; reg.mae = document.getElementById('mae').value; reg.dataE = d;
        reg.historico.push({ data: new Date().toLocaleString(), qtd: parseInt(q) });
        
        localStorage.setItem(chave, JSON.stringify(reg));
        alert("✅ Salvo no App!");
        ["idN","pai","mae","dataE","qtd"].forEach(i => document.getElementById(i).value = "");
    }

    function buscarManejo() {
        const id = document.getElementById('idBusca').value;
        const dados = JSON.parse(localStorage.getItem("JB_APP_" + id));
        if(!dados) return alert("Não encontrado!");
        const res = document.getElementById('res');
        res.style.display = "block";
        res.innerHTML = `<strong>NINHADA ${dados.id}</strong><br>Pais: ${dados.pai} x ${dados.mae}<br>Histórico:<br>` + 
                        dados.historico.map(h => `${h.data} - ${h.qtd} un`).join('<br>');
    }

    // REGISTRO DO SERVICE WORKER (Para funcionar Offline e ser App)
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
</script>
</body>
</html>
