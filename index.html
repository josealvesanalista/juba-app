<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a192f">
    <title>MANEJO BETTAS v7.2</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, getDocs, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDGkFLjHPD2w9vvG8JS9KlKE6v5gSJ7emE",
            authDomain: "jubabettas-5444b.firebaseapp.com",
            projectId: "jubabettas-5444b",
            storageBucket: "jubabettas-5444b.firebasestorage.app",
            messagingSenderId: "411914499486",
            appId: "1:411914499486:web:f7922f93bb67500b9dd28f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- TRAVAMENTO E AUTO-INCREMENTO ---
        window.gerarProximoId = async () => {
            const u = auth.currentUser;
            if (!u) return;
            const snap = await getDocs(collection(db, "usuarios", u.uid, "ninhadas"));
            let maxId = 0;
            snap.forEach(doc => {
                const num = parseInt(doc.data().id);
                if (!isNaN(num) && num > maxId) maxId = num;
            });
            document.getElementById('idN').value = String(maxId + 1).padStart(3, '0');
        };

        window.handleLogin = () => {
            const e = document.getElementById('email').value;
            const s = document.getElementById('senha').value;
            signInWithEmailAndPassword(auth, e, s).catch(err => alert("Erro: " + err.message));
        };

        window.handleSalvar = async () => {
            const u = auth.currentUser;
            const id = document.getElementById('idN').value;
            const q = document.getElementById('qtd').value;
            if(!u || !id || !q) return alert("Preencha os campos obrigatórios!");

            const ref = doc(db, "usuarios", u.uid, "ninhadas", id);
            const snap = await getDoc(ref);
            
            let hist = snap.exists() ? snap.data().historico : [];
            hist.push({ data: new Date().toLocaleDateString('pt-BR'), qtd: parseInt(q) });

            await setDoc(ref, {
                id, 
                pai: document.getElementById('pai').value, 
                mae: document.getElementById('mae').value,
                dataE: document.getElementById('dataE').value, 
                historico: hist,
                ultimaTPA: snap.exists() ? (snap.data().ultimaTPA || document.getElementById('dataE').value) : document.getElementById('dataE').value
            }, { merge: true });

            alert("REGISTRO SALVO!");
            ["pai", "mae", "dataE", "qtd"].forEach(id => document.getElementById(id).value = "");
            window.gerarProximoId();
            window.verificarTPAs();
        };

        window.registrarTPA = async (id) => {
            const u = auth.currentUser;
            const hoje = new Date().toISOString().split('T')[0];
            const ref = doc(db, "usuarios", u.uid, "ninhadas", id);
            await updateDoc(ref, { ultimaTPA: hoje });
            alert("TPA Confirmada!");
            window.handleConsultar();
            window.verificarTPAs();
        };

        window.verificarTPAs = async () => {
            const u = auth.currentUser;
            const alertaDiv = document.getElementById('alerta-tpa');
            const snap = await getDocs(collection(db, "usuarios", u.uid, "ninhadas"));
            let atrasadas = [];
            
            snap.forEach(doc => {
                const d = doc.data();
                const ultima = new Date(d.ultimaTPA + "T12:00:00");
                const diff = Math.floor((new Date() - ultima) / 86400000);
                if (diff >= 3) atrasadas.push(d.id);
            });

            if (atrasadas.length > 0) {
                alertaDiv.style.display = "block";
                alertaDiv.innerHTML = `⚠️ <b>TPA NECESSÁRIA:</b> ${atrasadas.join(', ')}`;
            } else {
                alertaDiv.style.display = "none";
            }
        };

        window.handleConsultar = async () => {
            const u = auth.currentUser;
            const id = document.getElementById('idBusca').value;
            if(!id) return alert("Digite o número");
            const snap = await getDoc(doc(db, "usuarios", u.uid, "ninhadas", id));
            if (snap.exists()) renderizarConsulta(snap.data());
            else alert("Não encontrado");
        };

        function renderizarConsulta(d) {
            const res = document.getElementById('res');
            const inicial = d.historico[0].qtd;
            const atual = d.historico[d.historico.length - 1].qtd;
            res.style.display = "block";
            res.innerHTML = `
                <div class="card-resultado">
                    <strong>NINHADA ${d.id}</strong>
                    <p><b>Pais:</b> ${d.pai} x ${d.mae}</p>
                    <p><b>Sobrevivência:</b> <span style="color:#64ffda">${((atual/inicial)*100).toFixed(1)}%</span></p>
                    <button class="btn-tpa" onclick="registrarTPA('${d.id}')">CONFIRMAR TPA HOJE</button>
                    <table>
                        <tr><th>Data</th><th>Qtd</th></tr>
                        ${d.historico.map(h => `<tr><td>${h.data}</td><td>${h.qtd}</td></tr>`).join('')}
                    </table>
                </div>`;
        }

        onAuthStateChanged(auth, (user) => {
            document.getElementById('tela-login').style.display = user ? 'none' : 'block';
            document.getElementById('tela-app').style.display = user ? 'block' : 'none';
            if(user) { window.gerarProximoId(); window.verificarTPAs(); }
        });
    </script>
