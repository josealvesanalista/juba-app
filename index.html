<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a192f">
    <link rel="manifest" href="manifest.json">
    <title>Juba Bettas - v6.3</title>
    <style>
        :root { --primary: #00a8ff; --bg: #0a192f; --card: #112240; --text: #e6f1ff; --accent: #64ffda; --warning: #f39c12; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 550px; background: var(--card); padding: 25px; border-radius: 15px; border: 1px solid #233554; box-sizing: border-box; }
        h2 { color: var(--accent); text-align: center; text-transform: uppercase; letter-spacing: 1px; font-size: 1.1rem; border-bottom: 2px solid var(--accent); padding-bottom: 10px; margin-top: 0; }
        
        .form-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 4px; font-size: 12px; color: var(--primary); font-weight: bold; }
        input { width: 100%; padding: 12px; background: #0a192f; border: 1px solid #233554; border-radius: 8px; color: white; box-sizing: border-box; font-size: 16px; }
        
        .btn-row { display: flex; gap: 8px; margin-top: 15px; }
        button { flex: 1; padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 12px; text-transform: uppercase; transition: 0.3s; }
        button:active { transform: scale(0.98); }
        
        .btn-auth { background: var(--accent); color: #0a192f; width: 100%; }
        .btn-save { background: var(--accent); color: #0a192f; }
        .btn-update { background: var(--warning); color: white; margin-top: 15px; width: 100%; }
        .btn-logout { background: transparent; color: #ff4d4d; border: 1px solid #ff4d4d; padding: 4px 8px; font-size: 10px; width: auto; flex: none; }
        
        .suporte { margin-top: 20px; text-align: center; font-size: 11px; color: #8892b0; border-top: 1px solid #233554; padding-top: 15px; }
        .suporte a { color: var(--accent); text-decoration: none; font-weight: bold; }

        .stats-box { background: rgba(100, 255, 218, 0.08); padding: 10px; border-radius: 8px; text-align: center; margin-bottom: 15px; border: 1px solid var(--accent); }
        .alerta { background: rgba(243, 156, 18, 0.15); border-left: 4px solid var(--warning); padding: 10px; margin: 10px 0; font-size: 12px; border-radius: 4px; color: #fff; }
        
        #res { margin-top: 15px; padding: 15px; background: rgba(255,255,255,0.03); border-radius: 10px; border: 1px solid var(--accent); display: none; }
        table { width: 100%; font-size: 12px; margin-top: 10px; border-collapse: collapse; }
        th, td { padding: 8px; border-bottom: 1px solid #233554; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div id="tela-login">
        <h2>Acesso Criador</h2>
        <div class="form-group"><label>E-mail</label><input type="email" id="email" placeholder="seu@email.com"></div>
        <div class="form-group"><label>Senha</label><input type="password" id="senha" placeholder="******"></div>
        
        <div id="campos-cadastro" style="display:none">
            <div class="form-group"><label>Nome da Marca (Ex: Juba Bettas)</label><input type="text" id="nomeCriador" placeholder="Juba Bettas"></div>
        </div>

        <button id="btn-entrar" class="btn-auth" onclick="handleLogin()">Entrar</button>
        
        <div id="container-botoes-cad">
            <button id="btn-chamar-cad" style="background:transparent; color:var(--accent); font-size:11px; margin-top:10px; width: 100%;" onclick="mostrarCamposCadastro()">Não tem conta? Criar nova conta</button>
        </div>

        <div id="acoes-cadastro" style="display:none">
            <button class="btn-save" style="width: 100%;" onclick="handleFinalizarCadastro()">Cadastrar e Entrar</button>
            <button style="background:transparent; color:#ff4d4d; font-size:11px; margin-top:10px; width: 100%;" onclick="location.reload()">Cancelar</button>
        </div>

        <div class="suporte">
            WHATSAPP DO SUPORTE:<br>
            <a href="https://wa.me/5583998027542" target="_blank">83 99802-7542</a>
        </div>
    </div>

    <div id="tela-app" style="display:none">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px">
            <small id="user-display" style="color:var(--accent); font-size:10px"></small>
            <button class="btn-logout" onclick="handleSignOut()">Sair</button>
        </div>
        <h2 id="titulo-app">Manejo Online</h2>

        <div class="stats-box">
            <small>Taxa Média de Sobrevivência Geral</small>
            <div id="media-geral" style="font-size: 20px; font-weight: bold; color: var(--accent)">0%</div>
        </div>

        <div class="form-group"><label>Nº da Ninhada</label><input type="text" id="idN"></div>
        <div style="display:flex; gap:10px">
            <div style="flex:1"><label>Macho (Pai)</label><input type="text" id="pai"></div>
            <div style="flex:1"><label>Fêmea (Mãe)</label><input type="text" id="mae"></div>
        </div>
        <div class="form-group" style="margin-top:10px"><label>Genética / Linhagem</label><input type="text" id="genetica"></div>
        <div style="display:flex; gap:10px">
            <div class="form-group" style="flex:1"><label>Eclosão</label><input type="date" id="dataE"></div>
            <div class="form-group" style="flex:1"><label>Qtd Alevinos</label><input type="number" id="qtd"></div>
        </div>

        <div class="btn-row">
            <button style="background:#334466; color:white" onclick="limparCampos()">Limpar</button>
            <button class="btn-save" onclick="handleSalvar()">Salvar na Nuvem</button>
        </div>

        <div class="search-section" style="margin-top:30px; border-top:1px dashed #233554; padding-top:20px">
            <label>Consulta de Ninhada</label>
            <input type="text" id="idBusca">
            <button style="background:var(--primary); color:white; width:100%; margin-top:8px" onclick="handleBuscar()">Consultar Online</button>
            <div id="res"></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDGkFLjHPD2w9vvG8JS9KlKE6v5gSJ7emE",
      authDomain: "jubabettas-5444b.firebaseapp.com",
      projectId: "jubabettas-5444b",
      storageBucket: "jubabettas-5444b.firebasestorage.app",
      messagingSenderId: "411914499486",
      appId: "1:411914499486:web:f7922f93bb67500b9dd28f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('tela-login').style.display = 'none';
            document.getElementById('tela-app').style.display = 'block';
            document.getElementById('titulo-app').innerText = `${user.displayName || 'Criador'} - Manejo Online`;
            document.getElementById('user-display').innerText = user.email;
            atualizarDashboard();
        } else {
            document.getElementById('tela-login').style.display = 'block';
            document.getElementById('tela-app').style.display = 'none';
        }
    });

    window.mostrarCamposCadastro = () => {
        document.getElementById('campos-cadastro').style.display = 'block';
        document.getElementById('acoes-cadastro').style.display = 'block';
        document.getElementById('btn-entrar').style.display = 'none';
        document.getElementById('container-botoes-cad').style.display = 'none';
    };

    window.handleLogin = () => {
        const e = document.getElementById('email').value;
        const s = document.getElementById('senha').value;
        if(!e || !s) return alert("Preencha email e senha");
        signInWithEmailAndPassword(auth, e, s).catch(err => alert("Erro ao entrar: " + err.message));
    };

    window.handleFinalizarCadastro = async () => {
        const e = document.getElementById('email').value;
        const s = document.getElementById('senha').value;
        const n = document.getElementById('nomeCriador').value;
        if(!e || !s || !n) return alert("Preencha todos os campos!");
        
        try {
            const res = await createUserWithEmailAndPassword(auth, e, s);
            await updateProfile(res.user, { displayName: n });
            location.reload();
        } catch(err) { alert(err.message); }
    };

    window.handleSignOut = () => signOut(auth);

    window.handleSalvar = async () => {
        const user = auth.currentUser;
        const id = document.getElementById('idN').value;
        const qtd = document.getElementById('qtd').value;
        if(!user || !id || !qtd) return alert("Preencha Nº e Qtd!");

        const ref = doc(db, "usuarios", user.uid, "ninhadas", id);
        const snap = await getDoc(ref);
        let historico = snap.exists() ? snap.data().historico : [];
        historico.push({ data: new Date().toLocaleString('pt-BR'), qtd: parseInt(qtd) });

        await setDoc(ref, {
            id, pai: document.getElementById('pai').value, mae: document.getElementById('mae').value,
            genetica: document.getElementById('genetica').value
