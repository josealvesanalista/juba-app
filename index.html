<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a192f">
    <title>Juba Bettas - v6.5 Stable</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        :root { --primary: #00a8ff; --bg: #0a192f; --card: #112240; --text: #e6f1ff; --accent: #64ffda; --warning: #f39c12; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 550px; background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #233554; box-sizing: border-box; }
        h2 { color: var(--accent); text-align: center; text-transform: uppercase; font-size: 1.1rem; border-bottom: 2px solid var(--accent); padding-bottom: 10px; margin-top: 0; }
        .form-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 4px; font-size: 12px; color: var(--primary); font-weight: bold; }
        input { width: 100%; padding: 12px; background: #0a192f; border: 1px solid #233554; border-radius: 8px; color: white; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 12px; text-transform: uppercase; margin-top: 10px; }
        .btn-auth { background: var(--accent); color: #0a192f; }
        .btn-save { background: var(--accent); color: #0a192f; }
        .btn-logout { background: transparent; color: #ff4d4d; border: 1px solid #ff4d4d; width: auto; padding: 5px 10px; font-size: 10px; margin: 0; }
        .suporte { margin-top: 20px; text-align: center; font-size: 11px; color: #8892b0; border-top: 1px solid #233554; padding-top: 15px; }
        .stats-box { background: rgba(100, 255, 218, 0.08); padding: 10px; border-radius: 8px; text-align: center; margin-bottom: 15px; border: 1px solid var(--accent); }
        #res { margin-top: 15px; padding: 15px; background: rgba(255,255,255,0.03); border-radius: 10px; border: 1px solid var(--accent); display: none; }
        table { width: 100%; font-size: 12px; margin-top: 10px; border-collapse: collapse; }
        th, td { padding: 8px; border-bottom: 1px solid #233554; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div id="tela-login">
        <h2>Acesso Criador</h2>
        <div class="form-group"><label>E-mail</label><input type="email" id="email"></div>
        <div class="form-group"><label>Senha</label><input type="password" id="senha"></div>
        <div id="campos-cadastro" style="display:none">
            <div class="form-group"><label>Nome da Marca (Ex: Juba Bettas)</label><input type="text" id="nomeCriador"></div>
        </div>
        <button id="btn-entrar" class="btn-auth" onclick="handleLogin()">Entrar</button>
        <button id="btn-ver-cad" style="background:transparent; color:var(--accent); font-size:11px;" onclick="mostrarCadastro()">Criar nova conta</button>
        <div id="acoes-cadastro" style="display:none">
            <button class="btn-save" onclick="handleCadastro()">Finalizar Cadastro</button>
            <button style="background:transparent; color:#ff4d4d; font-size:11px;" onclick="location.reload()">Cancelar</button>
        </div>
        <div class="suporte">WHATSAPP DO SUPORTE:<br><a href="https://wa.me/5583998027542" style="color:var(--accent); text-decoration:none;">83 99802-7542</a></div>
    </div>

    <div id="tela-app" style="display:none">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px">
            <small id="user-display" style="color:var(--accent); font-size:10px"></small>
            <button class="btn-logout" onclick="handleSair()">Sair</button>
        </div>
        <h2 id="titulo-app">Manejo Online</h2>
        <div class="stats-box"><small>Taxa Média de Sobrevivência</small><div id="media-geral" style="font-size: 20px; font-weight: bold; color: var(--accent)">0%</div></div>
        
        <div class="form-group"><label>Nº da Ninhada</label><input type="text" id="idN"></div>
        <div style="display:flex; gap:10px">
            <div style="flex:1"><label>Pai</label><input type="text" id="pai"></div>
            <div style="flex:1"><label>Mãe</label><input type="text" id="mae"></div>
        </div>
        <div class="form-group"><label>Genética</label><input type="text" id="genetica"></div>
        <div style="display:flex; gap:10px">
            <div style="flex:1"><label>Eclosão</label><input type="date" id="dataE"></div>
            <div style="flex:1"><label>Qtd</label><input type="number" id="qtd"></div>
        </div>
        <button class="btn-save" onclick="handleSalvar()">Salvar Ninhada</button>
        
        <div style="margin-top:25px; border-top:1px dashed #233554; padding-top:15px">
            <label>Buscar Nº</label>
            <input type="text" id="idBusca">
            <button style="background:var(--primary); color:white;" onclick="handleBuscar()">Consultar</button>
            <div id="res"></div>
        </div>
    </div>
</div>

<script>
    // CONFIGURAÇÃO FIREBASE
    const firebaseConfig = {
      apiKey: "AIzaSyDGkFLjHPD2w9vvG8JS9KlKE6v5gSJ7emE",
      authDomain: "jubabettas-5444b.firebaseapp.com",
      projectId: "jubabettas-5444b",
      storageBucket: "jubabettas-5444b.firebasestorage.app",
      messagingSenderId: "411914499486",
      appId: "1:411914499486:web:f7922f93bb67500b9dd28f"
    };

    // Inicialização
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // Monitor de Usuário
    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('tela-login').style.display = 'none';
            document.getElementById('tela-app').style.display = 'block';
            document.getElementById('titulo-app').innerText = (user.displayName || 'Criador') + " - Manejo";
            document.getElementById('user-display').innerText = user.email;
            atualizarDashboard();
        } else {
            document.getElementById('tela-login').style.display = 'block';
            document.getElementById('tela-app').style.display = 'none';
        }
    });

    // Funções de Interface
    function mostrarCadastro() {
        document.getElementById('campos-cadastro').style.display = 'block';
        document.getElementById('acoes-cadastro').style.display = 'block';
        document.getElementById('btn-entrar').style.display = 'none';
        document.getElementById('btn-ver-cad').style.display = 'none';
    }

    // Ações Firebase
    function handleLogin() {
        const e = document.getElementById('email').value;
        const s = document.getElementById('senha').value;
        auth.signInWithEmailAndPassword(e, s).catch(err => alert("Erro: " + err.message));
    }

    function handleCadastro() {
        const e = document.getElementById('email').value;
        const s = document.getElementById('senha').value;
        const n = document.getElementById('nomeCriador').value;
        if(!n) return alert("Digite o nome da Marca");

        auth.createUserWithEmailAndPassword(e, s)
            .then(res => {
                res.user.updateProfile({ displayName: n }).then(() => location.reload());
            })
            .catch(err => alert("Erro no cadastro: " + err.message));
    }

    function handleSair() { auth.signOut(); }

    function handleSalvar() {
        const user = auth.currentUser;
        const id = document.getElementById('idN').value;
        const qtd = document.getElementById('qtd').value;
        if(!id || !qtd) return alert("Preencha Nº e Quantidade");

        const ref = db.collection("usuarios").doc(user.uid).collection("ninhadas").doc(id);
        
        ref.get().then(docSnap => {
            let hist = docSnap.exists ? docSnap.data().historico : [];
            hist.push({ data: new Date().toLocaleString('pt-BR'), qtd: parseInt(qtd) });

            ref.set({
                id, pai: document.getElementById('pai').value,
                mae: document.getElementById('mae').value,
                genetica: document.getElementById('genetica').value,
                dataE: document.getElementById('dataE').value,
                historico: hist
            }).then(() => {
                alert("Salvo!");
                ["idN","pai","mae","dataE","qtd","genetica"].forEach(i => document.getElementById(i).value="");
                atualizarDashboard();
            });
        });
    }

    function handleBuscar() {
        const user = auth.currentUser;
        const id = document.getElementById('idBusca').value;
        db.collection("usuarios").doc(user.uid).collection("ninhadas").doc(id).get().then(snap => {
            if(snap.exists) renderizar(snap.data());
            else alert("Não encontrado");
        });
    }

    function renderizar(d) {
        const res = document.getElementById('res');
        const dias = Math.floor((new Date() - new Date(d.dataE)) / 86400000) + 1;
        res.style.display = "block";
        res.innerHTML = `<strong>NINHADA ${d.id} (${dias} Dias)</strong><br>
            Macho: ${d.pai} | Fêmea: ${d.mae}<br>
            <table border="1" style="width:100%; margin-top:10px;">
                <tr><th>Data</th><th>Qtd</th></tr>
                ${d.historico.map(h => `<tr><td>${h.data.split(' ')[0]}</td><td>${h.qtd}</td></tr>`).join('')}
            </table>
            <button style="background:var(--warning); color:white" onclick="prepararAt('${d.id}','${d.pai}','${d.mae}','${d.dataE}','${d.genetica}')">ATUALIZAR</button>`;
    }

    function prepararAt(id, p, m, de, g) {
        document.getElementById('idN').value = id;
        document.getElementById('pai').value = p;
        document.getElementById('mae').value = m;
        document.getElementById('dataE').value = de;
        document.getElementById('genetica').value = g;
        document.getElementById('qtd').value = "";
        window.scrollTo(0,0);
    }

    function atualizarDashboard() {
        const user = auth.currentUser;
        db.collection("usuarios").doc(user.uid).collection("ninhadas").get().then(snap => {
            let s = 0, t = 0;
            snap.forEach(doc => {
                const h = doc.data().historico;
                if(h.length > 0) { s += (h[h.length-1].qtd / h[0].qtd); t++; }
            });
            document.getElementById('media-geral').innerText =
