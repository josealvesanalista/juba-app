<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a192f">
    <link rel="manifest" href="manifest.json">
    <title>Juba Bettas - v6.4</title>
    <style>
        :root { --primary: #00a8ff; --bg: #0a192f; --card: #112240; --text: #e6f1ff; --accent: #64ffda; --warning: #f39c12; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 550px; background: var(--card); padding: 25px; border-radius: 15px; border: 1px solid #233554; box-sizing: border-box; }
        h2 { color: var(--accent); text-align: center; text-transform: uppercase; letter-spacing: 1px; font-size: 1.1rem; border-bottom: 2px solid var(--accent); padding-bottom: 10px; margin-top: 0; }
        .form-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 4px; font-size: 12px; color: var(--primary); font-weight: bold; }
        input { width: 100%; padding: 12px; background: #0a192f; border: 1px solid #233554; border-radius: 8px; color: white; box-sizing: border-box; font-size: 16px; }
        .btn-row { display: flex; gap: 8px; margin-top: 15px; }
        button { flex: 1; padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 12px; text-transform: uppercase; transition: 0.2s; }
        button:active { transform: scale(0.95); opacity: 0.8; }
        .btn-auth { background: var(--accent); color: #0a192f; width: 100%; }
        .btn-save { background: var(--accent); color: #0a192f; }
        .btn-update { background: var(--warning); color: white; margin-top: 15px; width: 100%; }
        .btn-logout { background: transparent; color: #ff4d4d; border: 1px solid #ff4d4d; padding: 4px 8px; font-size: 10px; width: auto; flex: none; }
        .suporte { margin-top: 20px; text-align: center; font-size: 11px; color: #8892b0; border-top: 1px solid #233554; padding-top: 15px; }
        .suporte a { color: var(--accent); text-decoration: none; font-weight: bold; }
        .stats-box { background: rgba(100, 255, 218, 0.08); padding: 10px; border-radius: 8px; text-align: center; margin-bottom: 15px; border: 1px solid var(--accent); }
        #res { margin-top: 15px; padding: 15px; background: rgba(255,255,255,0.03); border-radius: 10px; border: 1px solid var(--accent); display: none; }
        table { width: 100%; font-size: 12px; margin-top: 10px; border-collapse: collapse; }
        th, td { padding: 8px; border-bottom: 1px solid #233554; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div id="tela-login">
        <h2>Acesso Criador</h2>
        <div class="form-group"><label>E-mail</label><input type="email" id="email"></div>
        <div class="form-group"><label>Senha</label><input type="password" id="senha"></div>
        <div id="campos-cadastro" style="display:none">
            <div class="form-group"><label>Nome da Marca (Ex: Juba Bettas)</label><input type="text" id="nomeCriador"></div>
        </div>
        <button id="btn-login-exec" class="btn-auth">Entrar</button>
        <button id="btn-abrir-cad" style="background:transparent; color:var(--accent); font-size:11px; margin-top:10px; width: 100%;">Não tem conta? Criar agora</button>
        <div id="acoes-cadastro" style="display:none">
            <button id="btn-finalizar-cad" class="btn-save" style="width: 100%;">Cadastrar e Entrar</button>
            <button style="background:transparent; color:#ff4d4d; font-size:11px; margin-top:10px; width: 100%;" onclick="location.reload()">Cancelar</button>
        </div>
        <div class="suporte">WHATSAPP DO SUPORTE:<br><a href="https://wa.me/5583998027542" target="_blank">83 99802-7542</a></div>
    </div>

    <div id="tela-app" style="display:none">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px">
            <small id="user-display" style="color:var(--accent); font-size:10px"></small>
            <button id="btn-sair" class="btn-logout">Sair</button>
        </div>
        <h2 id="titulo-app">Manejo Online</h2>
        <div class="stats-box"><small>Taxa Média de Sobrevivência</small><div id="media-geral" style="font-size: 20px; font-weight: bold; color: var(--accent)">0%</div></div>
        <div class="form-group"><label>Nº da Ninhada</label><input type="text" id="idN"></div>
        <div style="display:flex; gap:10px">
            <div style="flex:1"><label>Pai</label><input type="text" id="pai"></div>
            <div style="flex:1"><label>Mãe</label><input type="text" id="mae"></div>
        </div>
        <div class="form-group" style="margin-top:10px"><label>Genética</label><input type="text" id="genetica"></div>
        <div style="display:flex; gap:10px">
            <div style="flex:1"><label>Eclosão</label><input type="date" id="dataE"></div>
            <div style="flex:1"><label>Qtd</label><input type="number" id="qtd"></div>
        </div>
        <div class="btn-row">
            <button id="btn-limpar" style="background:#334466; color:white">Limpar</button>
            <button id="btn-salvar" class="btn-save">Salvar</button>
        </div>
        <div class="search-section" style="margin-top:30px; border-top:1px dashed #233554; padding-top:20px">
            <label>Buscar Ninhada</label>
            <input type="text" id="idBusca">
            <button id="btn-buscar" style="background:var(--primary); color:white; width:100%; margin-top:8px">Consultar Online</button>
            <div id="res"></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDGkFLjHPD2w9vvG8JS9KlKE6v5gSJ7emE",
      authDomain: "jubabettas-5444b.firebaseapp.com",
      projectId: "jubabettas-5444b",
      storageBucket: "jubabettas-5444b.firebasestorage.app",
      messagingSenderId: "411914499486",
      appId: "1:411914499486:web:f7922f93bb67500b9dd28f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
        const logada = !!user;
        document.getElementById('tela-login').style.display = logada ? 'none' : 'block';
        document.getElementById('tela-app').style.display = logada ? 'block' : 'none';
        if (user) {
            document.getElementById('titulo-app').innerText = `${user.displayName || 'Criador'} - Manejo Online`;
            document.getElementById('user-display').innerText = user.email;
            atualizarDashboard();
        }
    });

    document.getElementById('btn-abrir-cad').addEventListener('click', () => {
        document.getElementById('campos-cadastro').style.display = 'block';
        document.getElementById('acoes-cadastro').style.display = 'block';
        document.getElementById('btn-login-exec').style.display = 'none';
        document.getElementById('btn-abrir-cad').style.display = 'none';
    });

    document.getElementById('btn-login-exec').addEventListener('click', () => {
        const e = document.getElementById('email').value, s = document.getElementById('senha').value;
        if(!e || !s) return alert("Preencha os campos!");
        signInWithEmailAndPassword(auth, e, s).catch(err => alert("Erro: " + err.message));
    });

    document.getElementById('btn-finalizar-cad').addEventListener('click', async () => {
        const e = document.getElementById('email').value, s = document.getElementById('senha').value, n = document.getElementById('nomeCriador').value;
        if(!e || !s || !n) return alert("Preencha tudo!");
        try {
            const res = await createUserWithEmailAndPassword(auth, e, s);
            await updateProfile(res.user, { displayName: n });
            location.reload();
        } catch(err) { alert(err.message); }
    });

    document.getElementById('btn-sair').addEventListener('click', () => signOut(auth));

    document.getElementById('btn-salvar').addEventListener('click', async () => {
        const u = auth.currentUser, id = document.getElementById('idN').value, q = document.getElementById('qtd').value;
        if(!u || !id || !q) return alert("Preencha Nº e Qtd!");
        const ref = doc(db, "usuarios", u.uid, "ninhadas", id), snap = await getDoc(ref);
        let hist = snap.exists() ? snap.data().historico : [];
        hist.push({ data: new Date().toLocaleString('pt-BR'), qtd: parseInt(q) });
        await setDoc(ref, { id, pai: document.getElementById('pai').value, mae: document.getElementById('mae').value, genetica: document.getElementById('genetica').value, dataE: document.getElementById('dataE').value, historico: hist });
        alert("✅ Sincronizado!"); limparCampos(); atualizarDashboard();
    });

    document.getElementById('btn-buscar').addEventListener('click', async () => {
        const u = auth.currentUser, id = document.getElementById('idBusca').value;
        const snap = await getDoc(doc(db, "usuarios", u.uid, "ninhadas", id));
        if (snap.exists()) renderizar(snap.data()); else alert("Não encontrada!");
    });

    function renderizar(d) {
        const res = document.getElementById('res'), dias = Math.floor((new Date() - new Date(d.dataE)) / 86400000) + 1;
        res.style.display = "block";
        res.innerHTML = `<strong>NINHADA ${d.id} (${dias} DIAS)</strong><br><small>${d.genetica || '---'}</small><br>
            Macho: ${d.pai} | Fêmea: ${d.mae}<br>
            <table><tr><th>Data</th><th>Qtd</th></tr>${d.historico.map(h => `<tr><td>${h.data.split(' ')[0]}</td><td>${h.qtd}</td></tr>`).join('')}</table>
