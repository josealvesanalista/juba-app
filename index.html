<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a192f">
    <title>MANEJO BETTAS v7.1 Refinada</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDGkFLjHPD2w9vvG8JS9KlKE6v5gSJ7emE",
            authDomain: "jubabettas-5444b.firebaseapp.com",
            projectId: "jubabettas-5444b",
            storageBucket: "jubabettas-5444b.firebasestorage.app",
            messagingSenderId: "411914499486",
            appId: "1:411914499486:web:f7922f93bb67500b9dd28f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- FUNÇÃO PARA TRAVAR E GERAR NÚMERO ---
        window.atualizarNumeroNinhada = async () => {
            const u = auth.currentUser;
            if(!u) return;
            const snap = await getDocs(collection(db, "usuarios", u.uid, "ninhadas"));
            let maior = 0;
            snap.forEach(d => {
                const n = parseInt(d.data().id);
                if(n > maior) maior = n;
            });
            document.getElementById('idN').value = String(maior + 1).padStart(3, '0');
        };

        // --- FUNÇÃO ALERTA TPA ---
        window.verificarTPAs = async () => {
            const u = auth.currentUser;
            const alerta = document.getElementById('alerta-tpa');
            const snap = await getDocs(collection(db, "usuarios", u.uid, "ninhadas"));
            let pendentes = [];
            snap.forEach(doc => {
                const d = doc.data();
                const ult = d.historico[d.historico.length-1].data; 
                // Logica simples: se não atualizou a qtd em 3 dias, avisa
                const partes = ult.split('/');
                const dataUlt = new Date(partes[2], partes[1]-1, partes[0]);
                if(Math.floor((new Date() - dataUlt)/86400000) >= 3) pendentes.push(d.id);
            });
            alerta.innerHTML = pendentes.length > 0 ? `<div style="background:#f39c12; color:white; padding:10px; border-radius:6px; margin-bottom:15px; font-size:12px">⚠️ TPA/CONTAGEM ATRASADA: ${pendentes.join(', ')}</div>` : "";
        };

        window.handleLogin = () => {
            const e = document.getElementById('email').value;
            const s = document.getElementById('senha').value;
            signInWithEmailAndPassword(auth, e, s).catch(err => alert("Erro: " + err.message));
        };

        window.handleSalvar = async () => {
            const u = auth.currentUser;
            const id = document.getElementById('idN').value;
            const q = document.getElementById('qtd').value;
            if(!u || !id || !q) return alert("Preencha Nº e Qtd!");

            const ref = doc(db, "usuarios", u.uid, "ninhadas", id);
            const snap = await getDoc(ref);
            let hist = snap.exists() ? snap.data().historico : [];
            hist.push({ data: new Date().toLocaleDateString('pt-BR'), qtd: parseInt(q) });

            await setDoc(ref, {
                id, pai: document.getElementById('pai').value, mae: document.getElementById('mae').value,
                dataE: document.getElementById('dataE').value, historico: hist
            });
            alert("REGISTRO SALVO!");
            ["pai", "mae", "dataE", "qtd"].forEach(id => document.getElementById(id).value = "");
            window.atualizarNumeroNinhada();
            window.verificarTPAs();
        };

        window.handleConsultar = async () => {
            const u = auth.currentUser;
            const id = document.getElementById('idBusca').value;
            const snap = await getDoc(doc(db, "usuarios", u.uid, "ninhadas", id));
            if (snap.exists()) renderizarConsulta(snap.data());
            else alert("Não encontrado");
        };

        function renderizarConsulta(d) {
            const res = document.getElementById('res');
            const inicial = d.historico[0].qtd;
            const atual = d.historico[d.historico.length - 1].qtd;
            res.style.display = "block";
            res.innerHTML = `
                <div class="card-resultado">
                    <strong>NINHADA ${d.id}</strong>
                    <p>Pais: ${d.pai} x ${d.mae}</p>
                    <p>Sobrevivência: <span style="color:#64ffda">${((atual/inicial)*100).toFixed(1)}%</span></p>
                    <table>
                        ${d.historico.map(h => `<tr><td>${h.data}</td><td>${h.qtd}</td></tr>`).join('')}
                    </table>
                </div>`;
        }

        onAuthStateChanged(auth, (user) => {
            document.getElementById('tela-login').style.display = user ? 'none' : 'block';
            document.getElementById('tela-app').style.display = user ? 'block' : 'none';
            if(user) { window.atualizarNumeroNinhada(); window.verificarTPAs(); }
        });
    </script>

    <style>
        :root { --bg: #0a192f; --card: #112240; --accent: #64ffda; --blue: #00a8ff; --text: #e6f1ff; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 15px; }
        .container { width: 100%; max-width: 450px; margin: auto; }
        input { width: 100%; padding: 12px; background: #0c1d36; border: 1px solid #233554; border-radius: 6px; color: white; margin-bottom: 10px; box-sizing: border-box; }
        input[readonly] { background: #071224; color: #8892b0; }
        button { border: none; border-radius: 6px; font-weight: bold; padding: 15px; cursor: pointer; text-transform: uppercase; width: 100%; }
        .btn-salvar { background: var(--accent); color: #0a192f; }
        .btn-consultar { background: var(--blue); color: white; margin-top: 10px; }
        .card-resultado { border: 1px solid var(--accent); border-radius: 10px; padding: 15px; margin-top: 15px; }
        table { width: 100%; margin-top: 10px; font-size: 13px; text-align: center; }
        .divider { border-top: 1px dashed #233554; margin: 20px 0; }
    </style>
</head>
<body>

<div class="container">
    <div id="tela-login">
        <h2 style="text-align:center; color:var(--accent)">MANEJO BETTAS</h2>
        <input type="email" id="email" placeholder="E-mail">
        <input type="password" id="senha" placeholder="Senha">
        <button class="btn-salvar" onclick="handleLogin()">ENTRAR</button>
    </div>

    <div id="tela-app" style="display:none">
        <label style="font-size:12px; color:var(--blue)">Nº DA NINHADA (AUTO)</label>
        <input type="text" id="idN" readonly>
        
        <div style="display:flex; gap:10px">
            <input type="text" id="pai" placeholder="Pai">
            <input type="text" id="mae" placeholder="Mãe">
        </div>
        <div style="display:flex; gap:10px">
            <input type="date" id="dataE">
            <input type="number" id="qtd" placeholder="Qtd">
        </div>
        <button class="btn-salvar" onclick="handleSalvar()">SALVAR REGISTRO</button>

        <div class="divider"></div>
        
        <div id="alerta-tpa"></div>

        <input type="text" id="idBusca" placeholder="Consultar Nº">
        <button class="btn-consultar" onclick="handleConsultar()">CONSULTAR</button>
        <div id="res"></div>
    </div>
</div>

</body>
</html>
