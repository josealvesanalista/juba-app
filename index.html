<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a192f">
    <link rel="manifest" href="manifest.json">
    <title>Juba Bettas - Full Online v5.5</title>
    <style>
        :root {
            --primary: #00a8ff;
            --bg: #0a192f;
            --card: #112240;
            --text: #e6f1ff;
            --accent: #64ffda;
            --warning: #f39c12;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 550px;
            background: var(--card);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #233554;
            box-sizing: border-box;
        }

        h2 {
            color: var(--accent);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 0;
            font-size: 1.2rem;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 10px;
        }

        #tela-login { display: block; }
        #tela-app { display: none; }

        .form-group { margin-bottom: 15px; }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 13px;
            color: var(--primary);
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 12px;
            background: #0a192f;
            border: 1px solid #233554;
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
            font-size: 16px; 
        }

        .btn-row { display: flex; gap: 10px; margin-top: 20px; }

        button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            font-size: 13px;
        }

        .btn-auth { background: var(--accent); color: #0a192f; }
        .btn-save { background: var(--accent); color: #0a192f; }
        .btn-clear { background: #334466; color: white; }
        .btn-update { background: var(--warning); color: white; }
        .btn-download { background: var(--primary); color: white; }
        .btn-logout { 
            background: transparent; 
            color: #ff4d4d; 
            border: 1px solid #ff4d4d; 
            padding: 5px 10px;
            width: auto;
            flex: none;
            font-size: 10px;
        }

        .search-section {
            margin-top: 35px;
            padding-top: 20px;
            border-top: 1px dashed #233554;
        }

        #res {
            margin-top: 20px;
            padding: 15px;
            background: rgba(100, 255, 218, 0.05);
            border-radius: 10px;
            border: 1px solid var(--accent);
            display: none;
        }

        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        table {
            width: 100%;
            margin-top: 15px;
            border-collapse: collapse;
            font-size: 12px;
        }

        th, td { padding: 8px; text-align: center; border-bottom: 1px solid #233554; }
        th { color: var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <div id="tela-login">
        <h2>Acesso Criador</h2>
        <div class="form-group"><label>E-mail</label><input type="email" id="email" placeholder="seu@email.com"></div>
        <div class="form-group"><label>Senha</label><input type="password" id="senha" placeholder="******"></div>
        <button class="btn-auth" onclick="handleLogin()">Entrar</button>
        <p style="text-align:center; font-size:12px"><a href="#" onclick="handleCadastro()" style="color:var(--accent)">Criar nova conta</a></p>
    </div>

    <div id="tela-app">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px">
            <small id="user-info" style="color:var(--accent); font-size:10px"></small>
            <button class="btn-logout" onclick="handleLogout()">Sair</button>
        </div>
        
        <h2>Manejo Online</h2>
        
        <div class="form-group">
            <label>Nº da Ninhada</label>
            <input type="text" id="idN">
        </div>

        <div style="display:flex; gap:10px">
            <div class="form-group" style="flex:1"><label>Pai</label><input type="text" id="pai"></div>
            <div class="form-group" style="flex:1"><label>Mãe</label><input type="text" id="mae"></div>
        </div>

        <div style="display:flex; gap:10px">
            <div class="form-group" style="flex:1"><label>Eclosão</label><input type="date" id="dataE"></div>
            <div class="form-group" style="flex:1"><label>Qtd Alevinos</label><input type="number" id="qtd"></div>
        </div>

        <div class="btn-row">
            <button class="btn-clear" onclick="limparCampos()">Limpar</button>
            <button class="btn-save" onclick="handleSalvar()">Salvar na Nuvem</button>
        </div>

        <div class="search-section">
            <label>Consultar Online</label>
            <input type="text" id="idBusca" placeholder="Nº da ninhada">
            <button style="background:var(--primary); color:white; margin-top:10px; width:100%" onclick="handleBuscar()">Buscar</button>
            <div id="res"></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDGkFLjHPD2w9vvG8JS9KlKE6v5gSJ7emE",
      authDomain: "jubabettas-5444b.firebaseapp.com",
      projectId: "jubabettas-5444b",
      storageBucket: "jubabettas-5444b.firebasestorage.app",
      messagingSenderId: "411914499486",
      appId: "1:411914499486:web:f7922f93bb67500b9dd28f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
        document.getElementById('tela-login').style.display = user ? 'none' : 'block';
        document.getElementById('tela-app').style.display = user ? 'block' : 'none';
        if(user) document.getElementById('user-info').innerText = user.email;
    });

    window.handleLogin = () => {
        signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('senha').value).catch(e => alert(e.message));
    };

    window.handleCadastro = () => {
        createUserWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('senha').value).catch(e => alert(e.message));
    };

    window.handleLogout = () => signOut(auth);

    window.handleSalvar = async () => {
        const user = auth.currentUser;
        const id = document.getElementById('idN').value;
        const qtd = document.getElementById('qtd').value;
        if(!user || !id || !qtd) return alert("Preencha Nº e Quantidade!");

        const ref = doc(db, "usuarios", user.uid, "ninhadas", id);
        const snap = await getDoc(ref);
        let historico = snap.exists() ? snap.data().historico : [];

        historico.push({ data: new Date().toLocaleString('pt-BR'), qtd: parseInt(qtd) });

        await setDoc(ref, {
            id, pai: document.getElementById('pai').value,
            mae: document.getElementById('mae').value,
            dataE: document.getElementById('dataE').value,
            historico
        });
        alert("✅ Sincronizado!");
        limparCampos();
    };

    window.handleBuscar = async () => {
        const user = auth.currentUser;
        const id = document.getElementById('idBusca').value;
        if(!user || !id) return;
        const docSnap = await getDoc(doc(db, "usuarios", user.uid, "ninhadas", id));
        if (docSnap.exists()) renderizarConsulta(docSnap.data());
        else alert("Ninhada não encontrada.");
    };

    function renderizarConsulta(dados) {
        const res = document.getElementById('res');
        const inicial = dados.historico[0].qtd;
        const atual = dados.historico[dados.historico.length - 1].qtd;
        const sobrevivencia = ((atual / inicial) * 100).toFixed(1);
        const dias = Math.floor((new Date() - new Date(dados.dataE)) / (1000 * 60 * 60 * 24)) + 1;

        res.style.display = "block";
        res.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center">
                <strong>NINHADA ${dados.id}</strong>
                <span style="background:var(--accent); color:var(--bg); padding:2px 8px; border-radius:4px; font-weight:bold; font-size:10px">${dias} DIAS</span>
            </div>
            <div style="margin-top:10px; font-size:13px">
                <b>Pais:</b> ${dados.pai} x ${dados.mae}<br>
                <b>Eclosão:</b> ${dados.dataE.split('-').reverse().join('/')}<br>
                <b>Sobrevivência:</b> <span style="color:var(--accent)">${sobrevivencia}%</span>
            </div>
            <table><tr><th>Data</th><th>Qtd</th></tr>
            ${dados.historico.map(h => `<tr><td>${h.data.split(' ')[0]}</td><td>${h.qtd}</td></tr>`).join('')}
            </table>
            <div class="action-buttons">
                <button class="btn-update" onclick="prepararAtualizacao('${dados.id}','${dados.pai}','${dados.mae}','${dados.dataE}')">Atualizar</button>
                <button class="btn-download" onclick="baixarTXT('${dados.id}')">TXT</button>
            </div>
        `;
    }

    window.prepararAtualizacao = (id, pai, mae, dataE) => {
        document.getElementById('idN').value = id;
        document.getElementById('pai').value = pai;
        document.getElementById('mae').value = mae;
        document.getElementById('dataE').value = dataE;
        document.getElementById('qtd').value = "";
        document.getElementById('qtd').focus();
        window.scrollTo({top: 0, behavior: 'smooth'});
    };

    window.baixarTXT = async (id) => {
        const user = auth.currentUser;
        const snap = await getDoc(doc(db, "usuarios", user.uid, "ninhadas", id));
        const d = snap.data();
        let txt = `NINHADA ${d.id}\nPAIS: ${d.pai} x ${d.mae}\nECLOSÃO: ${d.dataE}\n\n` + d.historico.map(h => `${h.data} -> ${h.qtd}`).join('\n');
        const blob = new Blob([txt], {type: 'text/plain'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `ninhada_${id}.txt`;
        a.click();
    };

    window.limparCampos = () => {
        ["idN", "pai", "mae", "dataE", "qtd"].forEach(id => document.getElementById(id).value = "");
    };
</script>
</body>
</html>
