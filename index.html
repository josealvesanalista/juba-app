<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a192f">
    <link rel="manifest" href="manifest.json">
    <title>Juba Bettas - Premium v5.4</title>
    <style>
        :root {
            --primary: #00a8ff;
            --bg: #0a192f;
            --card: #112240;
            --text: #e6f1ff;
            --accent: #64ffda;
            --warning: #f39c12;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 550px;
            background: var(--card);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #233554;
            box-sizing: border-box;
        }

        h2 {
            color: var(--accent);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 0;
            font-size: 1.2rem;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 10px;
        }

        /* Controle de Telas */
        #tela-login { display: block; }
        #tela-app { display: none; }

        .form-group { margin-bottom: 15px; }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 13px;
            color: var(--primary);
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 12px;
            background: #0a192f;
            border: 1px solid #233554;
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
            font-size: 16px; 
        }

        .btn-row { display: flex; gap: 10px; margin-top: 20px; }

        button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            font-size: 13px;
        }

        .btn-auth { background: var(--accent); color: #0a192f; }
        .btn-save { background: var(--accent); color: #0a192f; }
        .btn-clear { background: #334466; color: white; }
        .btn-logout { 
            background: transparent; 
            color: #ff4d4d; 
            border: 1px solid #ff4d4d; 
            padding: 5px 10px;
            width: auto;
            flex: none;
        }

        .search-section {
            margin-top: 35px;
            padding-top: 20px;
            border-top: 1px dashed #233554;
        }

        #res {
            margin-top: 20px;
            padding: 15px;
            background: rgba(100, 255, 218, 0.05);
            border-radius: 10px;
            border: 1px solid var(--accent);
            display: none;
        }

        table {
            width: 100%;
            margin-top: 15px;
            border-collapse: collapse;
            font-size: 12px;
        }

        th, td { padding: 8px; text-align: center; border-bottom: 1px solid #233554; }
        th { color: var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <div id="tela-login">
        <h2>Acesso Criador</h2>
        <div class="form-group">
            <label>E-mail</label>
            <input type="email" id="email" placeholder="seu@email.com">
        </div>
        <div class="form-group">
            <label>Senha</label>
            <input type="password" id="senha" placeholder="******">
        </div>
        <button class="btn-auth" onclick="handleLogin()">Entrar no Sistema</button>
        <p style="text-align:center; font-size: 12px; margin-top: 15px;">
            <a href="#" onclick="handleCadastro()" style="color: var(--accent); text-decoration: none;">Não tem conta? Criar acesso agora</a>
        </p>
    </div>

    <div id="tela-app">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <small id="user-info" style="color: var(--accent); font-size: 10px;"></small>
            <button class="btn-logout" onclick="handleLogout()">Sair</button>
        </div>
        
        <h2>Manejo Online</h2>
        
        <div class="form-group">
            <label>Nº da Ninhada</label>
            <input type="text" id="idN" placeholder="Ex: 001">
        </div>

        <div style="display:flex; gap:10px">
            <div class="form-group" style="flex:1">
                <label>Pai</label>
                <input type="text" id="pai">
            </div>
            <div class="form-group" style="flex:1">
                <label>Mãe</label>
                <input type="text" id="mae">
            </div>
        </div>

        <div style="display:flex; gap:10px">
            <div class="form-group" style="flex:1">
                <label>Eclosão</label>
                <input type="date" id="dataE">
            </div>
            <div class="form-group" style="flex:1">
                <label>Qtd Alevinos</label>
                <input type="number" id="qtd">
            </div>
        </div>

        <div class="btn-row">
            <button class="btn-clear" onclick="limparCampos()">Limpar</button>
            <button class="btn-save" onclick="handleSalvar()">Salvar na Nuvem</button>
        </div>

        <div class="search-section">
            <label>Consultar Minhas Ninhadas</label>
            <input type="text" id="idBusca" placeholder="Nº da ninhada">
            <button style="background: var(--primary); color: white; margin-top: 10px; width: 100%;" onclick="handleBuscar()">Consultar Online</button>
            
            <div id="res"></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDGkFLjHPD2w9vvG8JS9KlKE6v5gSJ7emE",
      authDomain: "jubabettas-5444b.firebaseapp.com",
      projectId: "jubabettas-5444b",
      storageBucket: "jubabettas-5444b.firebasestorage.app",
      messagingSenderId: "411914499486",
      appId: "1:411914499486:web:f7922f93bb67500b9dd28f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('tela-login').style.display = 'none';
            document.getElementById('tela-app').style.display = 'block';
            document.getElementById('user-info').innerText = user.email;
        } else {
            document.getElementById('tela-login').style.display = 'block';
            document.getElementById('tela-app').style.display = 'none';
        }
    });

    window.handleLogin = () => {
        const email = document.getElementById('email').value;
        const senha = document.getElementById('senha').value;
        signInWithEmailAndPassword(auth, email, senha).catch(e => alert("Erro: " + e.message));
    };

    window.handleCadastro = () => {
        const email = document.getElementById('email').value;
        const senha = document.getElementById('senha').value;
        if(!email || !senha) return alert("Preencha e-mail e senha para criar conta.");
        createUserWithEmailAndPassword(auth, email, senha).then(() => alert("Conta criada!")).catch(e => alert("Erro: " + e.message));
    };

    window.handleLogout = () => signOut(auth);

    window.handleSalvar = async () => {
        const user = auth.currentUser;
        const id = document.getElementById('idN').value;
        const qtd = document.getElementById('qtd').value;
        if(!user || !id || !qtd) return alert("Preencha os campos obrigatórios!");

        const ref = doc(db, "usuarios", user.uid, "ninhadas", id);
        const snap = await getDoc(ref);
        let historico = snap.exists() ? snap.data().historico : [];

        historico.push({ data: new Date().toLocaleString('pt-BR'), qtd: parseInt(qtd) });

        await setDoc(ref, {
            id, pai: document.getElementById('pai').value,
            mae: document.getElementById('mae').value,
            dataE: document.getElementById('dataE').value,
            historico
        });
        alert("✅ Sincronizado com sua conta!");
        limparCampos();
    };

    window.handleBuscar = async () => {
        const user = auth.currentUser;
        const id = document.getElementById('idBusca').value;
        if(!user || !id) return;

        const docRef = doc(db, "usuarios", user.uid, "ninhadas", id);
        const docSnap = await getDoc(docRef);

        if (docSnap.exists()) {
            renderizarConsulta(docSnap.data());
        } else {
            alert("Ninhada não encontrada na sua conta.");
        }
    };

    function renderizarConsulta(dados) {
        const res = document.getElementById('res');
        res.style.display = "block";
        res.innerHTML = `
            <strong>NINHADA ${dados.id}</strong><br>
            <small>${dados.pai} x ${dados.mae}</small>
            <table><tr><th>Data</th><th>Qtd</th></tr>
            ${dados.historico.map(h => `<tr><td>${h.data.split(' ')[0]}</td><td>${h.qtd}</td></tr>`).join('')}
            </table>
        `;
    }

    window.limparCampos = () => {
        ["idN", "pai", "mae", "dataE", "qtd"].forEach(id => document.getElementById(id).value = "");
    };
</script>
</body>
</html>
