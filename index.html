<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a192f">
    <title>Manejo Online v6.8</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDGkFLjHPD2w9vvG8JS9KlKE6v5gSJ7emE",
            authDomain: "jubabettas-5444b.firebaseapp.com",
            projectId: "jubabettas-5444b",
            storageBucket: "jubabettas-5444b.firebasestorage.app",
            messagingSenderId: "411914499486",
            appId: "1:411914499486:web:f7922f93bb67500b9dd28f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Funções globais para os botões funcionarem
        window.fazerLogin = () => {
            const e = document.getElementById('email').value;
            const s = document.getElementById('senha').value;
            signInWithEmailAndPassword(auth, e, s).catch(err => alert("Erro: " + err.message));
        };

        window.fazerCadastro = () => {
            const e = document.getElementById('email').value;
            const s = document.getElementById('senha').value;
            createUserWithEmailAndPassword(auth, e, s)
                .then(() => alert("Conta criada!"))
                .catch(err => alert("Erro ao criar: " + err.message));
        };

        window.fazerSair = () => signOut(auth);

        window.salvarDados = async () => {
            const u = auth.currentUser;
            const id = document.getElementById('idN').value;
            const qtd = document.getElementById('qtd').value;
            if(!id || !qtd) return alert("Preencha Nº e Qtd");

            const ref = doc(db, "usuarios", u.uid, "ninhadas", id);
            const snap = await getDoc(ref);
            let hist = snap.exists() ? snap.data().historico : [];
            hist.push({ data: new Date().toLocaleString('pt-BR'), qtd: parseInt(qtd) });

            await setDoc(ref, {
                id, pai: document.getElementById('pai').value, mae: document.getElementById('mae').value,
                dataE: document.getElementById('dataE').value, historico: hist
            });
            alert("Salvo!");
        };

        window.buscarNinhada = async () => {
            const u = auth.currentUser;
            const id = document.getElementById('idBusca').value;
            const snap = await getDoc(doc(db, "usuarios", u.uid, "ninhadas", id));
            if (snap.exists()) {
                const d = snap.data();
                const eclosao = new Date(d.dataE);
                const hoje = new Date();
                const dias = Math.floor((hoje - eclosao) / (1000 * 60 * 60 * 24)) + 1;
                
                document.getElementById('res').style.display = "block";
                document.getElementById('res').innerHTML = `
                    <strong>NINHADA Nº ${d.id}</strong><br>
                    Macho: ${d.pai} | Fêmea: ${d.mae}<br>
                    Eclosão: ${d.dataE.split('-').reverse().join('/')}<br>
                    Idade: ${dias} dias<br>
                    <table><tr><th>Data</th><th>Qtd</th></tr>
                    ${d.historico.map(h => `<tr><td>${h.data.split(' ')[0]}</td><td>${h.qtd}</td></tr>`).join('')}
                    </table>`;
            } else alert("Não encontrada");
        };

        onAuthStateChanged(auth, (user) => {
            document.getElementById('auth-section').style.display = user ? 'none' : 'block';
            document.getElementById('app-section').style.display = user ? 'block' : 'none';
            if(user) document.getElementById('user-mail').innerText = user.email;
        });
    </script>

    <style>
        :root { --accent: #64ffda; --bg: #0a192f; --card: #112240; --text: #e6f1ff; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .box { width: 100%; max-width: 400px; background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #233554; }
        h2 { color: var(--accent); text-align: center; font-size: 1.2rem; border-bottom: 1px solid var(--accent); padding-bottom: 10px; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #0a192f; border: 1px solid #233554; border-radius: 6px; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 14px; margin-top: 10px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-main { background: var(--accent); color: #0a192f; }
        .btn-sec { background: transparent; color: var(--accent); font-size: 11px; }
        .info { font-size: 11px; color: #f39c12; text-align: center; margin-bottom: 15px; }
        table { width: 100%; font-size: 12px; margin-top: 10px; border-collapse: collapse; }
        th, td { padding: 8px; border-bottom: 1px solid #233554; text-align: center; }
    </style>
</head>
<body>

<div class="box" id="auth-section">
    <h2>Acesso Criador</h2>
    <p class="info">Se não tem cadastro, preencha e-mail/senha e clique em "Criar nova conta".</p>
    <input type="email" id="email" placeholder="E-mail">
    <input type="password" id="senha" placeholder="Senha (mínimo 6 dígitos)">
    <button class="btn-main" onclick="fazerLogin()">Entrar</button>
    <button class="btn-sec" onclick="fazerCadastro()">Criar nova conta</button>
</div>

<div class="box" id="app-section" style="display:none">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px">
        <small id="user-mail" style="color:var(--accent); font-size:10px"></small>
        <button onclick="fazerSair()" style="width:auto; padding:4px 8px; font-size:10px; background:red; color:white;">Sair</button>
    </div>
    <h2>Manejo Online</h2>
    <input type="text" id="idN" placeholder="Nº da Ninhada">
    <input type="text" id="pai" placeholder="Macho (Pai)">
    <input type="text" id="mae" placeholder="Fêmea (Mãe)">
    <input type="date" id="dataE">
    <input type="number" id="qtd" placeholder="Quantidade">
    <button class="btn-main" onclick="salvarDados()">Salvar Ninhada</button>

    <div style="margin-top:20px; border-top:1px dashed #233554; padding-top:15px">
        <input type="text" id="idBusca" placeholder="Buscar Nº">
        <button class="btn-main" style="background:#00a8ff; color:white;" onclick="buscarNinhada()">Consultar</button>
        <div id="res" style="margin-top:10px; display:none; background:rgba(255,255,255,0.05); padding:10px; border-radius:8px;"></div>
    </div>
</div>

</body>
</html>
